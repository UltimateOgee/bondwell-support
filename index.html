<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Bondwell – Download on the App Store.">
  <meta name="apple-mobile-web-app-title" content="Bondwell">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Bondwell</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .logo {
      width: 120px;
      height: 120px;
      background: #1a1a2e;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      font-size: 3rem;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.2rem;
      color: #999;
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .app-store-btn {
      display: inline-block;
      text-decoration: none;
    }

    .app-store-btn img {
      height: 56px;
      border-radius: 12px;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.8rem;
      color: #444;
      display: flex;
      gap: 1.25rem;
      align-items: center;
    }

    footer a {
      color: #555;
      text-decoration: none;
      transition: color 0.15s;
    }
    footer a:hover { color: #999; }
  </style>
</head>
<body>
  <div class="logo">&#129730;</div>
  <h1>Bondwell</h1>
  <p>The best way to stay connected with that special someone. Available now on iPhone.</p>
  <a class="app-store-btn" href="https://apps.apple.com" target="_blank" rel="noopener noreferrer">
    <img
      src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg"
      alt="Download on the App Store"
    >
  </a>
  <footer>
    <span>&copy; 2026 Bondwell. All rights reserved.</span>
    <a href="terms.html">Terms</a>
    <a href="privacy.html">Privacy</a>
  </footer>
</body>
</html>
