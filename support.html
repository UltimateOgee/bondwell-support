<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Bondwell Support – Report an issue or get help.">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Bondwell – Support</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    .header {
      margin-top: 2rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .header p {
      font-size: 1rem;
      color: #999;
      max-width: 480px;
      line-height: 1.5;
    }

    .form-container {
      width: 100%;
      max-width: 640px;
      flex: 1;
      display: flex;
      flex-direction: column;
      margin-bottom: 4rem;
    }

    .form-container iframe {
      width: 100%;
      flex: 1;
      min-height: 900px;
      border: none;
      border-radius: 12px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 1.5rem;
      color: #555;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.15s;
    }
    .back-link:hover { color: #999; }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.8rem;
      color: #444;
      display: flex;
      gap: 1.25rem;
      align-items: center;
    }

    footer a {
      color: #555;
      text-decoration: none;
      transition: color 0.15s;
    }
    footer a:hover { color: #999; }
  </style>
</head>
<body>
  <a class="back-link" href="index.html">&larr; Back to Bondwell</a>

  <div class="header">
    <h1>Support</h1>
    <p>Having an issue or have feedback? Fill out the form below and we'll get back to you.</p>
  </div>

  <div class="form-container">
    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLSdxK6E331h1SP3jlZdNc4zwe2eb6Lw_93eEXULEzAKRxpsOWA/viewform?embedded=true"
      loading="lazy"
      title="Bondwell Support Form"
    >Loading...</iframe>
  </div>

  <footer>
    <span>&copy; 2026 Bondwell. All rights reserved.</span>
    <a href="terms.html">Terms</a>
    <a href="privacy.html">Privacy</a>
  </footer>
</body>
</html>
